<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Scam Detector</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
  <a href="/" class="nav-brand">
    <div class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <span class="nav-brand-text">Scam Detector</span>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <a href="/register" class="nav-btn-solid">Register</a>
  </div>
</nav>
 
<div class="page page-sm" style="padding-top:60px;">
  <div style="text-align:center;margin-bottom:32px;">
    <div style="width:52px;height:52px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <h1 class="page-title">Welcome back</h1>
    <p class="page-sub" style="margin-bottom:0;">Login to access your scan history and dashboard</p>
  </div>
 
  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}
 
  <div class="card">
    <form action="/login" method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="Enter your username" required>
      </div>
      <div class="form-group" style="margin-bottom:22px;">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Login</button>
    </form>
  </div>
 
  <p style="text-align:center;font-size:13.5px;color:var(--text3);margin-top:20px;">
    Don't have an account? <a href="/register" style="color:#93c5fd;text-decoration:none;font-weight:500;">Create one free</a>
  </p>
</div>
 
<footer>
  <div class="footer-left">© 2025 Scam Detector</div>
  <div class="footer-right"><a href="/" class="footer-link">Home</a></div>
</footer>
</body>
</html>

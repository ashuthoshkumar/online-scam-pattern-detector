<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Scam Detector</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
  <a href="/" class="nav-brand">
    <div class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <span class="nav-brand-text">Scam Detector</span>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <a href="/login" class="nav-btn-outline">Login</a>
  </div>
</nav>
 
<div class="page page-sm" style="padding-top:60px;">
  <div style="text-align:center;margin-bottom:32px;">
    <div style="width:52px;height:52px;background:linear-gradient(135deg,var(--green),var(--cyan));border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    </div>
    <h1 class="page-title">Create account</h1>
    <p class="page-sub" style="margin-bottom:0;">Free account to track your scans and get alerts</p>
  </div>
 
  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}
  {% if success %}
    <div class="alert alert-success">{{ success }}</div>
  {% endif %}
 
  <div class="card">
    <form action="/register" method="POST" onsubmit="return checkPasswords()">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" id="password" class="form-input" placeholder="Create a strong password" required>
      </div>
      <div class="form-group" style="margin-bottom:22px;">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Re-enter your password" required>
        <p id="pass-msg" style="font-size:12px;margin-top:6px;display:none;"></p>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
    </form>
  </div>
 
  <p style="text-align:center;font-size:13.5px;color:var(--text3);margin-top:20px;">
    Already have an account? <a href="/login" style="color:#93c5fd;text-decoration:none;font-weight:500;">Login here</a>
  </p>
</div>
 
<footer>
  <div class="footer-left">© 2025 Scam Detector</div>
  <div class="footer-right"><a href="/" class="footer-link">Home</a></div>
</footer>
 
<script>
  // Live password match check
  document.getElementById('confirm_password').addEventListener('input', function() {
    const p1 = document.getElementById('password').value;
    const p2 = this.value;
    const msg = document.getElementById('pass-msg');
    msg.style.display = 'block';
    if (p2 === '') { msg.style.display = 'none'; return; }
    if (p1 === p2) {
      msg.textContent = '✅ Passwords match';
      msg.style.color = '#6ee7b7';
      this.style.borderColor = 'rgba(16,185,129,0.5)';
    } else {
      msg.textContent = '❌ Passwords do not match';
      msg.style.color = '#fca5a5';
      this.style.borderColor = 'rgba(239,68,68,0.5)';
    }
  });
 
  function checkPasswords() {
    const p1 = document.getElementById('password').value;
    const p2 = document.getElementById('confirm_password').value;
    if (p1 !== p2) {
      alert('Passwords do not match!');
      return false;
    }
    return true;
  }
</script>
</body>
</html>
